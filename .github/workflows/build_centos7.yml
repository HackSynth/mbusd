name: Build and Release mbusd (CentOS 7)

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0, v2.0 等 tag 时触发 Release
  workflow_dispatch: # 允许在 Actions 页面手动触发用于测试

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须：允许该 Action 创建 Release 并上传文件

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        # 注：如果你是在一个空仓库里专门用来编译官方 mbusd，请取消下面两行的注释：
        # with:
        #   repository: 32bitmicro/mbusd

      - name: Compile mbusd in CentOS 7 Docker
        run: |
          # 启动 CentOS 7 容器，将当前代码目录挂载到容器的 /workspace 中进行编译
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace centos:7 /bin/bash -c "
            # 1. 修复 CentOS 7 EOL 导致的 YUM 源失效问题 (切换到 vault 归档源)
            sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-* &&
            sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-* &&
            yum clean all &&
            
            # 2. 安装编译依赖 (附加 systemd-devel 以支持 CentOS 7 的 systemctl 管理)
            yum install -y gcc make cmake git systemd-devel &&
            
            # 3. 创建构建目录并编译 mbusd
            mkdir -p build &&
            cd build &&
            cmake -DENABLE_SYSTEMD=ON .. &&
            make
          "

      - name: Fix Directory Permissions
        run: |
          # Docker 以 root 身份运行，产生的文件需要交还权限给 GitHub Actions 的运行用户
          sudo chown -R $USER:$USER build

      - name: Rename and Package Binary
        run: |
          # 提取二进制文件，重命名并赋予执行权限
          mv build/mbusd mbusd-centos7-x86_64
          chmod +x mbusd-centos7-x86_64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        # 仅在推送 tag 时才执行真正的 Release 发布
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: mbusd-centos7-x86_64
          generate_release_notes: true
